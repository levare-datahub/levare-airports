name: Refresh airports

on:
  schedule:
    - cron: '0 4 * * 1'      # 04:00 UTC every Monday
  workflow_dispatch: {}       # adds a manual "Run workflow" button

permissions:
  contents: write             # lets the job commit the refreshed file

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Trim OurAirports data
        run: python trim_airports.py

      - name: Commit if the data changed
        run: |
          if [ -n "$(git status --porcelain airports.min.json)" ]; then
            git config user.name  "airport-refresh-bot"
            git config user.email "actions@github.com"
            git add airports.min.json
            git commit -m "Refresh airports data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes this week."
          fi
